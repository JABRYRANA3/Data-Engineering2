# DE2 Final Project — Configuration
track: A_Esports
author: JABRY
version: v1.0

paths:
  raw_csv_glob: "data/raw/matches_*.csv"
  bronze: "outputs/project/bronze"
  silver: "outputs/project/silver"
  gold: "outputs/project/gold"
  text_corpus: "data/corpus/esports_corpus.csv"
  streaming_landing: "data/streaming/landing/"
  streaming_source: "data/streaming/source/"
  proof: "proof"
  metrics_log: "project_metrics_log.csv"

layout:
  partition_by: ["region"]
  shuffle_partitions: 8

streaming:
  window_duration: "1 hour"
  watermark: "15 minutes"
  trigger_interval: "10 seconds"
  max_files_per_trigger: 1

text:
  query_terms: ["hero", "ability", "damage", "mana", "ultimate"]
  stop_words:
    - the
    - a
    - an
    - is
    - are
    - was
    - were
    - in
    - on
    - at
    - to
    - for
    - of
    - and
    - or
    - with
    - by
    - as
    - from
    - this
    - that
    - it

iterative:
  path: "A_graph"   # A_graph or B_clustering
  num_iterations: 10
  damping: 0.85
  partitions: 8

llm:
  min_text_length: 100
  source: "synthetic_esports_v1"
  intended_use: "RAG / fine-tuning for esports analytics assistant"

slos:
  pipeline_max_minutes: 10
  streaming_trigger_max_s: 30
  text_query_max_s: 2
  parquet_csv_ratio_max: 0.6
  llm_quality_pass_rate_min: 0.80
